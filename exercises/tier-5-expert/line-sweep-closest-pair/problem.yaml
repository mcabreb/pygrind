id: "t5-018"
title: "Closest Pair of Points"
tier: 5
topic: "computational geometry"
description: |
  Given N points in the 2D plane, find the minimum Euclidean distance
  between any pair of distinct points. Use divide-and-conquer or
  line sweep for efficiency.

  Input format:
    - Line 1: an integer N (2 <= N <= 100000)
    - Next N lines: two space-separated integers x y
      (-10^9 <= x, y <= 10^9). All points are distinct.

  Output format:
    - A single line: the minimum distance, rounded to 4 decimal places.
time_estimate: 25
hint: "Sort points by x-coordinate. Divide into left and right halves, recursively find closest pair in each half. For the merge step, only consider points within distance d of the dividing line, and sort those by y-coordinate. Each point needs to be compared with at most 7 subsequent points in this strip."
solution: |
  import sys
  import math

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      n = int(data[idx]); idx += 1
      points = []
      for _ in range(n):
          x = int(data[idx]); idx += 1
          y = int(data[idx]); idx += 1
          points.append((x, y))

      points.sort()

      def dist(p1, p2):
          return math.sqrt((p1[0]-p2[0])**2 + (p1[1]-p2[1])**2)

      def closest(pts):
          n = len(pts)
          if n <= 3:
              best = float('inf')
              for i in range(n):
                  for j in range(i+1, n):
                      best = min(best, dist(pts[i], pts[j]))
              return best

          mid = n // 2
          mid_x = pts[mid][0]
          left = pts[:mid]
          right = pts[mid:]

          d = min(closest(left), closest(right))

          strip = [p for p in pts if abs(p[0] - mid_x) < d]
          strip.sort(key=lambda p: p[1])

          for i in range(len(strip)):
              j = i + 1
              while j < len(strip) and strip[j][1] - strip[i][1] < d:
                  d = min(d, dist(strip[i], strip[j]))
                  j += 1

          return d

      result = closest(points)
      print(f"{result:.4f}")

  solve()
