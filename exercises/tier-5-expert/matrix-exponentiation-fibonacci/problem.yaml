id: "t5-011"
title: "Fibonacci via Matrix Exponentiation"
tier: 5
topic: "advanced algorithms"
description: |
  Compute the N-th Fibonacci number modulo 10^9 + 7 using matrix
  exponentiation. The Fibonacci sequence is defined as:
    F(0) = 0, F(1) = 1, F(n) = F(n-1) + F(n-2) for n >= 2.

  Input format:
    - Line 1: an integer T (1 <= T <= 1000), the number of queries.
    - Next T lines: a single integer N (0 <= N <= 10^18).

  Output format:
    - T lines, each containing F(N) mod (10^9 + 7).
time_estimate: 22
hint: "The identity [[F(n+1), F(n)], [F(n), F(n-1)]] = [[1,1],[1,0]]^n allows computing F(n) in O(log n) time via matrix exponentiation. Multiply 2x2 matrices using binary exponentiation."
solution: |
  import sys

  MOD = 10**9 + 7

  def mat_mul(A, B):
      return [
          [(A[0][0]*B[0][0] + A[0][1]*B[1][0]) % MOD,
           (A[0][0]*B[0][1] + A[0][1]*B[1][1]) % MOD],
          [(A[1][0]*B[0][0] + A[1][1]*B[1][0]) % MOD,
           (A[1][0]*B[0][1] + A[1][1]*B[1][1]) % MOD]
      ]

  def mat_pow(M, p):
      result = [[1,0],[0,1]]
      base = M
      while p > 0:
          if p % 2 == 1:
              result = mat_mul(result, base)
          base = mat_mul(base, base)
          p //= 2
      return result

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      t = int(data[idx]); idx += 1
      out = []
      for _ in range(t):
          n = int(data[idx]); idx += 1
          if n == 0:
              out.append('0')
          elif n == 1:
              out.append('1')
          else:
              M = [[1, 1], [1, 0]]
              R = mat_pow(M, n - 1)
              out.append(str(R[0][0]))
      print('\n'.join(out))

  solve()
