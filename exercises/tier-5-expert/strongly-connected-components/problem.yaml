id: "t5-021"
title: "Strongly Connected Components"
tier: 5
topic: "graph theory"
description: |
  Given a directed graph, find the number of strongly connected components
  (SCCs). A strongly connected component is a maximal set of vertices such
  that there is a path from each vertex to every other vertex in the set.

  Input format:
    - Line 1: two space-separated integers N M
      (1 <= N <= 100000; 0 <= M <= 200000)
    - Next M lines: two space-separated integers u v (1 <= u, v <= N)
      representing a directed edge from u to v.

  Output format:
    - A single integer: the number of strongly connected components.
time_estimate: 22
hint: "Use Kosaraju's algorithm: (1) Perform DFS on the original graph, pushing vertices onto a stack in order of completion. (2) Transpose the graph. (3) Pop vertices from the stack and perform DFS on the transposed graph; each DFS from an unvisited vertex discovers one SCC."
solution: |
  import sys
  sys.setrecursionlimit(300000)

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      n = int(data[idx]); idx += 1
      m = int(data[idx]); idx += 1

      adj = [[] for _ in range(n + 1)]
      radj = [[] for _ in range(n + 1)]

      for _ in range(m):
          u = int(data[idx]); idx += 1
          v = int(data[idx]); idx += 1
          adj[u].append(v)
          radj[v].append(u)

      visited = [False] * (n + 1)
      order = []

      def dfs1(u):
          stack = [(u, 0)]
          visited[u] = True
          while stack:
              node, idx = stack[-1]
              if idx < len(adj[node]):
                  stack[-1] = (node, idx + 1)
                  v = adj[node][idx]
                  if not visited[v]:
                      visited[v] = True
                      stack.append((v, 0))
              else:
                  order.append(node)
                  stack.pop()

      for i in range(1, n + 1):
          if not visited[i]:
              dfs1(i)

      visited2 = [False] * (n + 1)
      count = 0

      def dfs2(u):
          stack = [u]
          visited2[u] = True
          while stack:
              node = stack.pop()
              for v in radj[node]:
                  if not visited2[v]:
                      visited2[v] = True
                      stack.append(v)

      for u in reversed(order):
          if not visited2[u]:
              dfs2(u)
              count += 1

      print(count)

  solve()
