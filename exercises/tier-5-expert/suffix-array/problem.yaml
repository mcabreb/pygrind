id: "t5-019"
title: "Suffix Array Construction"
tier: 5
topic: "strings"
description: |
  Given a string S, construct its suffix array. The suffix array is an
  array of integers giving the starting positions of all suffixes of S
  sorted in lexicographic order.

  Input format:
    - Line 1: a string S consisting of lowercase English letters.
      (1 <= |S| <= 100000)

  Output format:
    - A single line: the suffix array as space-separated 0-indexed positions.
time_estimate: 25
hint: "Use the O(N log^2 N) or O(N log N) approach: start with single-character ranks, then iteratively double the comparison length. At each step, sort suffixes by pairs of ranks (current rank, rank at position + gap). Update ranks based on sorted order."
solution: |
  import sys

  def solve():
      s = sys.stdin.read().strip()
      n = len(s)
      if n == 0:
          print()
          return

      sa = list(range(n))
      rank = [ord(c) for c in s]
      tmp = [0] * n

      gap = 1
      while True:
          def cmp_key(i):
              return (rank[i], rank[i + gap] if i + gap < n else -1)

          sa.sort(key=cmp_key)

          tmp[sa[0]] = 0
          for i in range(1, n):
              tmp[sa[i]] = tmp[sa[i - 1]]
              if cmp_key(sa[i]) != cmp_key(sa[i - 1]):
                  tmp[sa[i]] += 1

          rank = tmp[:]

          if rank[sa[n - 1]] == n - 1:
              break
          gap *= 2

      print(' '.join(map(str, sa)))

  solve()
