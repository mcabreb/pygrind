id: "t5-009"
title: "Convex Hull"
tier: 5
topic: "computational geometry"
description: |
  Given N points in the 2D plane, compute the convex hull and output the
  number of points on the convex hull and the perimeter of the convex hull
  rounded to 2 decimal places.

  Input format:
    - Line 1: an integer N (3 <= N <= 100000)
    - Next N lines: two space-separated integers x y (-10^9 <= x, y <= 10^9)
      representing a point. All points are distinct.

  Output format:
    - Line 1: the number of vertices on the convex hull.
    - Line 2: the perimeter of the convex hull, rounded to 2 decimal places.
time_estimate: 22
hint: "Use the Andrew's monotone chain algorithm: sort points by (x, y), build lower hull and upper hull separately. The cross product determines whether to turn left or right."
solution: |
  import sys
  import math

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      n = int(data[idx]); idx += 1
      points = []
      for _ in range(n):
          x = int(data[idx]); idx += 1
          y = int(data[idx]); idx += 1
          points.append((x, y))

      points.sort()

      def cross(o, a, b):
          return (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0])

      lower = []
      for p in points:
          while len(lower) >= 2 and cross(lower[-2], lower[-1], p) <= 0:
              lower.pop()
          lower.append(p)

      upper = []
      for p in reversed(points):
          while len(upper) >= 2 and cross(upper[-2], upper[-1], p) <= 0:
              upper.pop()
          upper.append(p)

      hull = lower[:-1] + upper[:-1]

      perimeter = 0.0
      h = len(hull)
      for i in range(h):
          j = (i + 1) % h
          dx = hull[j][0] - hull[i][0]
          dy = hull[j][1] - hull[i][1]
          perimeter += math.sqrt(dx * dx + dy * dy)

      print(h)
      print(f"{perimeter:.2f}")

  solve()
source: "original"
validation: "exact"
