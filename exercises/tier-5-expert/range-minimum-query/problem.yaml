id: "t5-017"
title: "Sparse Table — Range Minimum Query"
tier: 5
topic: "advanced data structures"
description: |
  Given an array of N integers and Q queries, answer each query asking for
  the minimum value in a subarray [L, R] (1-indexed, inclusive) in O(1)
  per query after O(N log N) preprocessing.

  Input format:
    - Line 1: two space-separated integers N Q
      (1 <= N <= 500000; 1 <= Q <= 500000)
    - Line 2: N space-separated integers a_1, a_2, ..., a_N
      (-10^9 <= a_i <= 10^9)
    - Next Q lines: two space-separated integers L R (1 <= L <= R <= N)

  Output format:
    - Q lines, each containing the minimum value in the range [L, R].
time_estimate: 20
hint: "Build a sparse table where st[k][i] = min(a[i..i+2^k-1]). For a query [L,R], compute k = floor(log2(R-L+1)) and answer min(st[k][L], st[k][R-2^k+1])."
solution: |
  import sys
  import math

  def solve():
      data = sys.stdin.buffer.read().split()
      idx = 0
      n = int(data[idx]); idx += 1
      q = int(data[idx]); idx += 1
      a = [int(data[idx + i]) for i in range(n)]
      idx += n

      LOG = max(1, int(math.log2(n)) + 1) if n > 0 else 1
      st = [a[:]]
      for k in range(1, LOG + 1):
          prev = st[k - 1]
          length = 1 << k
          row = []
          for i in range(n - length + 1):
              row.append(min(prev[i], prev[i + (1 << (k - 1))]))
          st.append(row)

      out = []
      for _ in range(q):
          l = int(data[idx]) - 1; idx += 1
          r = int(data[idx]) - 1; idx += 1
          length = r - l + 1
          k = int(math.log2(length))
          ans = min(st[k][l], st[k][r - (1 << k) + 1])
          out.append(str(ans))
      sys.stdout.write('\n'.join(out) + '\n')

  solve()
source: "original"
validation: "exact"
