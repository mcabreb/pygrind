id: "t5-020"
title: "Longest Path in a DAG"
tier: 5
topic: "graph theory"
description: |
  Given a directed acyclic graph (DAG) with weighted edges, find the
  length of the longest path from a source vertex S to a destination
  vertex T.

  Input format:
    - Line 1: four space-separated integers N M S T
      (1 <= N <= 100000; 0 <= M <= 200000; 1 <= S, T <= N)
    - Next M lines: three space-separated integers u v w
      representing a directed edge from u to v with weight w.
      (1 <= u, v <= N; 1 <= w <= 10000)

  Output format:
    - A single integer: the length of the longest path from S to T.
      If T is not reachable from S, output "IMPOSSIBLE".
time_estimate: 20
hint: "Perform a topological sort of the DAG. Then relax edges in topological order, similar to shortest path but maximizing instead. Initialize dist[S] = 0 and dist[v] = -infinity for all other vertices."
solution: |
  import sys
  from collections import deque

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      n = int(data[idx]); idx += 1
      m = int(data[idx]); idx += 1
      s = int(data[idx]); idx += 1
      t = int(data[idx]); idx += 1

      adj = [[] for _ in range(n + 1)]
      in_deg = [0] * (n + 1)

      for _ in range(m):
          u = int(data[idx]); idx += 1
          v = int(data[idx]); idx += 1
          w = int(data[idx]); idx += 1
          adj[u].append((v, w))
          in_deg[v] += 1

      queue = deque()
      for i in range(1, n + 1):
          if in_deg[i] == 0:
              queue.append(i)

      topo = []
      while queue:
          u = queue.popleft()
          topo.append(u)
          for v, w in adj[u]:
              in_deg[v] -= 1
              if in_deg[v] == 0:
                  queue.append(v)

      dist = [-1] * (n + 1)
      dist[s] = 0

      for u in topo:
          if dist[u] == -1:
              continue
          for v, w in adj[u]:
              if dist[u] + w > dist[v]:
                  dist[v] = dist[u] + w

      if dist[t] == -1:
          print("IMPOSSIBLE")
      else:
          print(dist[t])

  solve()
