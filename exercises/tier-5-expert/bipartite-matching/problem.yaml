id: "t5-006"
title: "Maximum Bipartite Matching"
tier: 5
topic: "graph theory"
description: |
  Given a bipartite graph with two sets of vertices (left set of size N,
  right set of size M), find the maximum number of edges that can be
  selected such that no two selected edges share a vertex.

  Input format:
    - Line 1: three space-separated integers N M E
      (1 <= N, M <= 500; 0 <= E <= N*M)
    - Next E lines: two space-separated integers u v (1 <= u <= N, 1 <= v <= M)
      representing an edge from left vertex u to right vertex v.

  Output format:
    - A single integer: the size of the maximum matching.
time_estimate: 22
hint: "Use the Hopcroft-Karp algorithm or the Hungarian method. A simpler approach is augmenting-path based: for each left vertex, try to find an augmenting path using DFS. If the matched right vertex can be re-matched to another left vertex, augment."
solution: |
  import sys
  sys.setrecursionlimit(100000)

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      n = int(data[idx]); idx += 1
      m = int(data[idx]); idx += 1
      e = int(data[idx]); idx += 1

      adj = [[] for _ in range(n + 1)]
      for _ in range(e):
          u = int(data[idx]); idx += 1
          v = int(data[idx]); idx += 1
          adj[u].append(v)

      match_r = [0] * (m + 1)

      def try_kuhn(u, visited):
          for v in adj[u]:
              if visited[v]:
                  continue
              visited[v] = True
              if match_r[v] == 0 or try_kuhn(match_r[v], visited):
                  match_r[v] = u
                  return True
          return False

      result = 0
      for u in range(1, n + 1):
          visited = [False] * (m + 1)
          if try_kuhn(u, visited):
              result += 1

      print(result)

  solve()
