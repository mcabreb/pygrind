id: "t2-022"
title: "Sum of Squares"
tier: 2
topic: "math"
description: "Read an integer N from stdin. Print the sum of the squares of all integers from 1 to N (inclusive). For example, if N = 3, the answer is 1^2 + 2^2 + 3^2 = 14."
time_estimate: 5
hint: "Use a loop or a generator expression with sum(). The formula N*(N+1)*(2*N+1)//6 also works."
solution: |
  n = int(input())
  print(sum(i * i for i in range(1, n + 1)))
source: "original"
validation: "exact"
