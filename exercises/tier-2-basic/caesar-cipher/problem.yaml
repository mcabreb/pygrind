id: "t2-010"
title: "Caesar Cipher"
tier: 2
topic: "strings"
description: "Read an integer K (the shift amount) from the first line, then read a string from the second line. Encrypt the string using a Caesar cipher: shift each letter forward by K positions in the alphabet, wrapping around from z to a. Preserve the case of each letter. Non-letter characters remain unchanged. Print the encrypted string."
time_estimate: 7
hint: "Use ord() and chr() to work with character codes. For a lowercase letter, compute (ord(c) - ord('a') + k) % 26 + ord('a')."
solution: |
  k = int(input())
  s = input()
  result = []
  for c in s:
      if c.isalpha():
          base = ord('A') if c.isupper() else ord('a')
          result.append(chr((ord(c) - base + k) % 26 + base))
      else:
          result.append(c)
  print("".join(result))
source: "original"
validation: "exact"
