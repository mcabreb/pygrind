id: "t1-020"
title: "Factorial"
tier: 1
topic: "math"
description: "Read a non-negative integer n and print its factorial (n!). The factorial of 0 is 1."
time_estimate: 3
hint: "Use a loop to multiply numbers from 1 to n, or start with result = 1 and multiply upward."
solution: |
  n = int(input())
  result = 1
  for i in range(1, n + 1):
      result *= i
  print(result)
source: "original"
validation: "exact"
