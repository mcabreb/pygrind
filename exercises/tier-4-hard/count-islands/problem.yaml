id: "t4-022"
title: "Count Islands"
tier: 4
topic: "graphs"
description: |
  Given a 2D grid of '1's (land) and '0's (water), count the number of
  islands. An island is surrounded by water and is formed by connecting
  adjacent land cells horizontally or vertically (not diagonally).

  Input format:
    - Line 1: two integers M N (grid dimensions, 1 <= M, N <= 300)
    - Next M lines: N space-separated characters ('0' or '1')

  Output format:
    - A single integer: the number of islands.
time_estimate: 15
hint: "Use BFS or DFS. Iterate through each cell; when you find a '1', increment island count and flood-fill (mark all connected '1's as visited)."
solution: |
  import sys
  from collections import deque

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      M = int(data[idx]); idx += 1
      N = int(data[idx]); idx += 1
      grid = []
      for i in range(M):
          row = []
          for j in range(N):
              row.append(data[idx]); idx += 1
          grid.append(row)
      visited = [[False] * N for _ in range(M)]
      count = 0
      for i in range(M):
          for j in range(N):
              if grid[i][j] == '1' and not visited[i][j]:
                  count += 1
                  queue = deque([(i, j)])
                  visited[i][j] = True
                  while queue:
                      r, c = queue.popleft()
                      for dr, dc in [(-1,0),(1,0),(0,-1),(0,1)]:
                          nr, nc = r + dr, c + dc
                          if 0 <= nr < M and 0 <= nc < N and grid[nr][nc] == '1' and not visited[nr][nc]:
                              visited[nr][nc] = True
                              queue.append((nr, nc))
      print(count)

  solve()
