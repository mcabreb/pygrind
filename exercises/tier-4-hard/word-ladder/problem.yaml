id: "t4-016"
title: "Word Ladder"
tier: 4
topic: "graphs"
description: |
  Given two words (beginWord and endWord) and a dictionary, find the length
  of the shortest transformation sequence from beginWord to endWord such
  that only one letter can be changed at a time, and each intermediate word
  must exist in the dictionary.

  The length counts the number of words in the sequence (including begin
  and end words). If no such sequence exists, return 0.

  Input format:
    - Line 1: beginWord (lowercase English letters)
    - Line 2: endWord (lowercase English letters)
    - Line 3: integer N (size of dictionary, 1 <= N <= 5000)
    - Next N lines: one dictionary word per line
  All words have the same length (1 <= length <= 10).

  Output format:
    - A single integer: the length of the shortest transformation sequence,
      or 0 if impossible.
time_estimate: 18
hint: "Use BFS. Start from beginWord, generate all possible one-letter variations, check if they exist in the dictionary. Use a visited set to avoid revisiting. Return depth when endWord is found."
solution: |
  from collections import deque

  def solve():
      begin = input().strip()
      end = input().strip()
      n = int(input().strip())
      word_set = set()
      for _ in range(n):
          word_set.add(input().strip())
      if end not in word_set:
          print(0)
          return
      queue = deque([(begin, 1)])
      visited = {begin}
      while queue:
          word, depth = queue.popleft()
          for i in range(len(word)):
              for c in 'abcdefghijklmnopqrstuvwxyz':
                  next_word = word[:i] + c + word[i+1:]
                  if next_word == end:
                      print(depth + 1)
                      return
                  if next_word in word_set and next_word not in visited:
                      visited.add(next_word)
                      queue.append((next_word, depth + 1))
      print(0)

  solve()
source: "original"
validation: "exact"
