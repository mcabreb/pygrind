id: "t4-027"
title: "LCS of Three Strings"
tier: 4
topic: "dp"
description: |
  Given three strings, find the length of the longest common subsequence
  (LCS) among all three strings.

  Input format:
    - Line 1: string A (1 <= len(A) <= 100)
    - Line 2: string B (1 <= len(B) <= 100)
    - Line 3: string C (1 <= len(C) <= 100)
  Strings contain only lowercase English letters.

  Output format:
    - A single integer: the length of the LCS of all three strings.
time_estimate: 16
hint: "Extend the classic 2-string LCS to 3D DP. dp[i][j][k] = LCS of A[:i], B[:j], C[:k]. If A[i-1]==B[j-1]==C[k-1], dp[i][j][k] = dp[i-1][j-1][k-1]+1. Otherwise take max of dp[i-1][j][k], dp[i][j-1][k], dp[i][j][k-1]."
solution: |
  def solve():
      a = input().strip()
      b = input().strip()
      c = input().strip()
      la, lb, lc = len(a), len(b), len(c)
      dp = [[[0] * (lc + 1) for _ in range(lb + 1)] for _ in range(la + 1)]
      for i in range(1, la + 1):
          for j in range(1, lb + 1):
              for k in range(1, lc + 1):
                  if a[i-1] == b[j-1] == c[k-1]:
                      dp[i][j][k] = dp[i-1][j-1][k-1] + 1
                  else:
                      dp[i][j][k] = max(dp[i-1][j][k], dp[i][j-1][k], dp[i][j][k-1])
      print(dp[la][lb][lc])

  solve()
source: "original"
validation: "exact"
