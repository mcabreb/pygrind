id: "t4-015"
title: "Unique Paths with Obstacles"
tier: 4
topic: "dp"
description: |
  A robot is located at the top-left corner of an M x N grid and wants to
  reach the bottom-right corner. The robot can only move right or down.
  Some cells contain obstacles (marked as 1). Find the number of unique
  paths from top-left to bottom-right.

  Input format:
    - Line 1: two integers M N (1 <= M, N <= 100)
    - Next M lines: N space-separated integers (0 = empty, 1 = obstacle)

  Output format:
    - A single integer: the number of unique paths. If start or end is
      blocked, print 0.
time_estimate: 14
hint: "Use DP where dp[i][j] = number of paths to (i,j). If cell is obstacle, dp[i][j] = 0. Otherwise dp[i][j] = dp[i-1][j] + dp[i][j-1]. Initialize dp[0][0] = 1 if not blocked."
solution: |
  import sys

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      M = int(data[idx]); idx += 1
      N = int(data[idx]); idx += 1
      grid = []
      for i in range(M):
          row = []
          for j in range(N):
              row.append(int(data[idx])); idx += 1
          grid.append(row)
      if grid[0][0] == 1 or grid[M-1][N-1] == 1:
          print(0)
          return
      dp = [[0] * N for _ in range(M)]
      dp[0][0] = 1
      for i in range(M):
          for j in range(N):
              if grid[i][j] == 1:
                  dp[i][j] = 0
              else:
                  if i > 0:
                      dp[i][j] += dp[i-1][j]
                  if j > 0:
                      dp[i][j] += dp[i][j-1]
      print(dp[M-1][N-1])

  solve()
source: "original"
validation: "exact"
