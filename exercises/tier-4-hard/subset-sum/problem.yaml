id: "t4-012"
title: "Subset Sum"
tier: 4
topic: "dp"
description: |
  Given a set of N non-negative integers and a target sum T, determine if
  there exists a subset whose elements sum to exactly T.

  Input format:
    - Line 1: two integers N T (1 <= N <= 200, 0 <= T <= 10000)
    - Line 2: N space-separated non-negative integers (each <= 10000)

  Output format:
    - Print "YES" if a subset with sum T exists, "NO" otherwise.
time_estimate: 15
hint: "Use a boolean DP array of size T+1. dp[0] = True. For each number, iterate backwards from T to the number's value, setting dp[j] = True if dp[j - num] is True."
solution: |
  import sys

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      N = int(data[idx]); idx += 1
      T = int(data[idx]); idx += 1
      nums = [int(data[idx + i]) for i in range(N)]
      dp = [False] * (T + 1)
      dp[0] = True
      for num in nums:
          for j in range(T, num - 1, -1):
              if dp[j - num]:
                  dp[j] = True
      print("YES" if dp[T] else "NO")

  solve()
