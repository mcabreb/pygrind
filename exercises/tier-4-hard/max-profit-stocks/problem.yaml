id: "t4-028"
title: "Best Time to Buy and Sell Stock (2 Transactions)"
tier: 4
topic: "dp"
description: |
  Given an array of stock prices over N days, find the maximum profit you
  can achieve with at most 2 transactions. A transaction consists of buying
  and then selling one share of stock. You must sell before buying again
  (no overlapping transactions).

  Input format:
    - Line 1: integer N (1 <= N <= 100000)
    - Line 2: N space-separated non-negative integers (prices)

  Output format:
    - A single integer: the maximum profit with at most 2 transactions.
    - If no profit is possible, print 0.
time_estimate: 18
hint: "Compute two arrays: left[i] = max profit from one transaction in days 0..i, right[i] = max profit from one transaction in days i..n-1. Answer is max(left[i] + right[i]) for all i."
solution: |
  import sys

  def solve():
      data = sys.stdin.read().split()
      n = int(data[0])
      prices = [int(data[i+1]) for i in range(n)]
      if n < 2:
          print(0)
          return
      # left[i] = max profit from 0..i with one transaction
      left = [0] * n
      min_price = prices[0]
      for i in range(1, n):
          min_price = min(min_price, prices[i])
          left[i] = max(left[i-1], prices[i] - min_price)
      # right[i] = max profit from i..n-1 with one transaction
      right = [0] * n
      max_price = prices[n-1]
      for i in range(n-2, -1, -1):
          max_price = max(max_price, prices[i])
          right[i] = max(right[i+1], max_price - prices[i])
      ans = 0
      for i in range(n):
          ans = max(ans, left[i] + right[i])
      print(ans)

  solve()
source: "original"
validation: "exact"
