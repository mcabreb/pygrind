id: "t4-011"
title: "Word Break"
tier: 4
topic: "dp"
description: |
  Given a string S and a dictionary of words, determine if S can be segmented
  into a space-separated sequence of one or more dictionary words. Each
  dictionary word may be used multiple times.

  Input format:
    - Line 1: string S (1 <= len(S) <= 1000, lowercase English letters)
    - Line 2: integer N (number of words in dictionary, 1 <= N <= 1000)
    - Next N lines: one dictionary word per line (lowercase English letters)

  Output format:
    - Print "YES" if S can be segmented, "NO" otherwise.
time_estimate: 15
hint: "Use DP where dp[i] is True if s[:i] can be segmented. For each position i, check all words: if dp[i - len(word)] is True and s[i-len(word):i] equals word, then dp[i] = True."
solution: |
  import sys

  def solve():
      s = input().strip()
      n = int(input().strip())
      words = set()
      for _ in range(n):
          words.add(input().strip())
      dp = [False] * (len(s) + 1)
      dp[0] = True
      for i in range(1, len(s) + 1):
          for word in words:
              wl = len(word)
              if i >= wl and dp[i - wl] and s[i - wl:i] == word:
                  dp[i] = True
                  break
      print("YES" if dp[len(s)] else "NO")

  solve()
source: "original"
validation: "exact"
