id: "t4-008"
title: "Dijkstra's Shortest Path"
tier: 4
topic: "graphs"
description: |
  Given a weighted directed graph, find the shortest path distance from a
  source vertex to all other vertices using Dijkstra's algorithm.

  Input format:
    - Line 1: two integers N M (number of vertices, number of edges)
      (1 <= N <= 10000, 0 <= M <= 100000)
    - Line 2: integer S (source vertex, 0-indexed)
    - Next M lines: three integers U V W (edge from U to V with weight W)
      (0 <= U, V < N, 1 <= W <= 10^6)

  Output format:
    - N space-separated integers: the shortest distance from S to each
      vertex 0..N-1. Print -1 if a vertex is unreachable.
time_estimate: 18
hint: "Use a min-heap (priority queue). Initialize distances to infinity except dist[S]=0. Pop the smallest distance vertex, relax its neighbors. Use heapq in Python."
solution: |
  import heapq
  import sys

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      N = int(data[idx]); idx += 1
      M = int(data[idx]); idx += 1
      S = int(data[idx]); idx += 1
      adj = [[] for _ in range(N)]
      for _ in range(M):
          u = int(data[idx]); idx += 1
          v = int(data[idx]); idx += 1
          w = int(data[idx]); idx += 1
          adj[u].append((v, w))
      INF = float('inf')
      dist = [INF] * N
      dist[S] = 0
      pq = [(0, S)]
      while pq:
          d, u = heapq.heappop(pq)
          if d > dist[u]:
              continue
          for v, w in adj[u]:
              if dist[u] + w < dist[v]:
                  dist[v] = dist[u] + w
                  heapq.heappush(pq, (dist[v], v))
      result = []
      for i in range(N):
          result.append(str(dist[i]) if dist[i] != INF else "-1")
      print(" ".join(result))

  solve()
