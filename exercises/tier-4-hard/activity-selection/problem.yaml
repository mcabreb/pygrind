id: "t4-019"
title: "Activity Selection (Weighted)"
tier: 4
topic: "dp"
description: |
  Given N activities, each with a start time, end time, and profit, find the
  maximum profit you can earn by selecting non-overlapping activities.
  Two activities overlap if one starts before the other ends.

  Input format:
    - Line 1: integer N (1 <= N <= 10000)
    - Next N lines: three space-separated integers S E P
      (start, end, profit; 0 <= S < E <= 10^6, 1 <= P <= 10^6)

  Output format:
    - A single integer: the maximum profit from non-overlapping activities.
time_estimate: 18
hint: "Sort by end time. For each activity i, use binary search to find the latest non-overlapping activity j. dp[i] = max(dp[i-1], profit[i] + dp[j])."
solution: |
  import bisect
  import sys

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      n = int(data[idx]); idx += 1
      activities = []
      for _ in range(n):
          s = int(data[idx]); idx += 1
          e = int(data[idx]); idx += 1
          p = int(data[idx]); idx += 1
          activities.append((e, s, p))
      activities.sort()
      ends = [a[0] for a in activities]
      dp = [0] * (n + 1)
      for i in range(1, n + 1):
          e, s, p = activities[i - 1]
          # find latest activity that ends <= s
          j = bisect.bisect_right(ends, s, 0, i - 1)
          dp[i] = max(dp[i - 1], p + dp[j])
      print(dp[n])

  solve()
source: "original"
validation: "exact"
