id: "t4-018"
title: "Merge Intervals"
tier: 4
topic: "sorting"
description: |
  Given a collection of intervals, merge all overlapping intervals and
  output the resulting non-overlapping intervals in sorted order.

  Input format:
    - Line 1: integer N (number of intervals, 1 <= N <= 10000)
    - Next N lines: two space-separated integers L R (start and end of
      interval, 0 <= L <= R <= 10^6)

  Output format:
    - Print each merged interval on a separate line as "L R".
    - Intervals should be sorted by start value.
time_estimate: 14
hint: "Sort intervals by start time. Iterate through them, merging if the current interval overlaps with the previous one (i.e., current start <= previous end). Otherwise start a new interval."
solution: |
  import sys

  def solve():
      data = sys.stdin.read().split()
      idx = 0
      n = int(data[idx]); idx += 1
      intervals = []
      for _ in range(n):
          l = int(data[idx]); idx += 1
          r = int(data[idx]); idx += 1
          intervals.append((l, r))
      intervals.sort()
      merged = [intervals[0]]
      for i in range(1, n):
          l, r = intervals[i]
          if l <= merged[-1][1]:
              merged[-1] = (merged[-1][0], max(merged[-1][1], r))
          else:
              merged.append((l, r))
      for l, r in merged:
          print(l, r)

  solve()
source: "original"
validation: "exact"
