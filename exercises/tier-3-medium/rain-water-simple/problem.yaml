id: "t3-024"
title: "Trapped Rain Water"
tier: 3
topic: "algorithms"
description: "Given N non-negative integers representing an elevation map where the width of each bar is 1, compute how much water can be trapped after raining. Input: the first line contains N, the second line contains N space-separated non-negative integers representing the height of each bar. Output: print the total units of trapped water."
time_estimate: 12
hint: "For each position, the water trapped is min(max_left, max_right) - height[i]. Precompute the maximum height to the left and right of each position using two passes."
solution: |
  n = int(input())
  h = list(map(int, input().split()))
  if n < 3:
      print(0)
  else:
      left_max = [0] * n
      right_max = [0] * n
      left_max[0] = h[0]
      for i in range(1, n):
          left_max[i] = max(left_max[i - 1], h[i])
      right_max[n - 1] = h[n - 1]
      for i in range(n - 2, -1, -1):
          right_max[i] = max(right_max[i + 1], h[i])
      water = 0
      for i in range(n):
          water += min(left_max[i], right_max[i]) - h[i]
      print(water)
source: "original"
validation: "exact"
