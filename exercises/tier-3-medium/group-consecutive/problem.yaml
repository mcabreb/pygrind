id: "t3-023"
title: "Group Consecutive Numbers"
tier: 3
topic: "algorithms"
description: "Given a sorted list of unique integers, group them into ranges of consecutive numbers. Input: the first line contains N, the second line contains N space-separated sorted integers. Output: print each range on its own line. A range of one number is printed as just that number. A range of two or more consecutive numbers is printed as \"start-end\"."
time_estimate: 10
hint: "Iterate through the sorted list. Track the start of the current range. When the next number is not consecutive (or you reach the end), output the range and start a new one."
solution: |
  n = int(input())
  nums = list(map(int, input().split()))
  ranges = []
  start = nums[0]
  end = nums[0]
  for i in range(1, n):
      if nums[i] == end + 1:
          end = nums[i]
      else:
          if start == end:
              ranges.append(str(start))
          else:
              ranges.append(f"{start}-{end}")
          start = nums[i]
          end = nums[i]
  if start == end:
      ranges.append(str(start))
  else:
      ranges.append(f"{start}-{end}")
  for r in ranges:
      print(r)
source: "original"
validation: "exact"
