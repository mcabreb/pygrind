id: "t3-013"
title: "Pascal's Triangle Row"
tier: 3
topic: "math"
description: "Given a row number N (0-indexed), print that row of Pascal's triangle. Row 0 is [1], row 1 is [1, 1], row 2 is [1, 2, 1], and so on. Each element is the sum of the two elements directly above it. Input: a single integer N (0 <= N <= 20). Output: print the elements of row N separated by spaces."
time_estimate: 8
hint: "Build the row iteratively. Start with [1]. For each new row, each inner element is the sum of adjacent elements from the previous row. Or use the formula: C(n, k) = C(n, k-1) * (n - k + 1) / k."
solution: |
  n = int(input())
  row = [1]
  for k in range(1, n + 1):
      row.append(row[-1] * (n - k + 1) // k)
  print(" ".join(map(str, row)))
source: "original"
validation: "exact"
