id: "t3-012"
title: "Look-and-Say Sequence"
tier: 3
topic: "strings"
description: "Generate the Nth term of the look-and-say sequence. The sequence starts with \"1\". Each subsequent term is generated by describing the previous term: count consecutive identical digits and say the count followed by the digit. For example: 1 -> 11 -> 21 -> 1211 -> 111221. Input: a single integer N (1 <= N <= 15). Output: print the Nth term of the sequence."
time_estimate: 10
hint: "Start with the string '1'. For each iteration, scan the current string grouping consecutive identical characters. Build the next string by appending the count and the character for each group."
solution: |
  n = int(input())
  s = "1"
  for _ in range(n - 1):
      result = []
      i = 0
      while i < len(s):
          ch = s[i]
          count = 0
          while i < len(s) and s[i] == ch:
              count += 1
              i += 1
          result.append(str(count) + ch)
      s = "".join(result)
  print(s)
source: "original"
validation: "exact"
