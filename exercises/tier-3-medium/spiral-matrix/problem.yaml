id: "t3-007"
title: "Spiral Matrix Order"
tier: 3
topic: "algorithms"
description: "Given an N x N matrix of integers, print all elements in spiral order (clockwise, starting from the top-left corner). Input: the first line contains N, followed by N lines each containing N space-separated integers. Output: a single line with all elements in spiral order, separated by spaces."
time_estimate: 12
hint: "Maintain four boundaries: top, bottom, left, right. Traverse right along the top row, down the right column, left along the bottom row, and up the left column. Shrink the boundaries after each pass."
solution: |
  n = int(input())
  matrix = []
  for _ in range(n):
      matrix.append(list(map(int, input().split())))
  result = []
  top, bottom, left, right = 0, n - 1, 0, n - 1
  while top <= bottom and left <= right:
      for col in range(left, right + 1):
          result.append(matrix[top][col])
      top += 1
      for row in range(top, bottom + 1):
          result.append(matrix[row][right])
      right -= 1
      if top <= bottom:
          for col in range(right, left - 1, -1):
              result.append(matrix[bottom][col])
          bottom -= 1
      if left <= right:
          for row in range(bottom, top - 1, -1):
              result.append(matrix[row][left])
          left += 1
  print(" ".join(map(str, result)))
source: "original"
validation: "exact"
